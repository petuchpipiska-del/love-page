<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Люблю тебя Алина</title>

<style>
body{
        margin:0;
        overflow:hidden;
        background:
        radial-gradient(circle at center,#220010,#000000 75%);
        font-family:Arial,sans-serif;
}

#scene{
        position:relative;
        width:100vw;
        height:100vh;
}

/* слова сердца */
.word{
        position:absolute;
        color:#ff9ad8;
        font-size:20px;
        font-weight:bold;
        opacity:.20;
        transform:translate(-50%,-50%);
        transition:.35s;
        text-shadow:0 0 8px #ff4da6;
}

.word.active{
        opacity:1;
        transform:translate(-50%,-50%) scale(1.18);
        text-shadow:
                0 0 10px pink,
                0 0 22px #ff4da6,
                0 0 38px red;
}

/* центр */
.center-box{
        position:absolute;
        left:50%;
        top:50%;
        transform:translate(-50%,-50%);
        text-align:center;
        z-index:10;
}

.name{
        color:#ff2b2b;
        font-size:74px;
        font-weight:bold;
        text-shadow:
                0 0 12px red,
                0 0 24px crimson,
                0 0 45px #ff0033;
        animation:pulse 1.4s infinite alternate;
}

.sub{
        margin-top:10px;
        color:#ff5a5a;
        font-size:34px;
        font-weight:bold;
        text-shadow:
                0 0 8px red,
                0 0 18px crimson;
        animation:fade 2s infinite alternate;
}

/* звезды */
.star{
        position:absolute;
        width:3px;
        height:3px;
        border-radius:50%;
        background:white;
        box-shadow:0 0 10px white;
        animation:blink 2.4s infinite;
}

/* падающие сердечки */
.fall{
        position:absolute;
        color:#ff4da6;
        font-size:18px;
        opacity:.8;
        animation:fall linear infinite;
}

/* сияющий круг */
.glow{
        position:absolute;
        left:50%;
        top:50%;
        width:260px;
        height:260px;
        transform:translate(-50%,-50%);
        border-radius:50%;
        background:radial-gradient(circle,rgba(255,0,80,.18),transparent 70%);
        filter:blur(8px);
        z-index:1;
        animation:halo 2.5s infinite alternate;
}

@keyframes pulse{
        from{transform:scale(1);}
        to{transform:scale(1.08);}
}

@keyframes fade{
        from{opacity:.6;}
        to{opacity:1;}
}

@keyframes blink{
        0%{opacity:.2;transform:scale(1);}
        50%{opacity:1;transform:scale(1.8);}
        100%{opacity:.2;transform:scale(1);}
}

@keyframes fall{
        from{transform:translateY(-60px);opacity:0;}
        15%{opacity:1;}
        to{transform:translateY(110vh);opacity:0;}
}

@keyframes halo{
        from{transform:translate(-50%,-50%) scale(1);}
        to{transform:translate(-50%,-50%) scale(1.15);}
}
</style>
</head>
<body>

<div id="scene">

        <div class="glow"></div>

        <div class="center-box">
                <div class="name">Alina</div>
                <div class="sub">Люблю тебя</div>
        </div>

</div>

<script>
const scene = document.getElementById("scene");
const words = [];

const cx = window.innerWidth / 2;
const cy = window.innerHeight / 2;

/* сердце */
for(let t=0; t<Math.PI*2; t+=0.12){

        let x = 16 * Math.pow(Math.sin(t),3);
        let y = 13*Math.cos(t)
                    - 5*Math.cos(2*t)
                    - 2*Math.cos(3*t)
                    - Math.cos(4*t);

        let el = document.createElement("div");
        el.className = "word";
        el.innerText = "LOVE";

        el.style.left = (cx + x * 20) + "px";
        el.style.top  = (cy - y * 20) + "px";

        scene.appendChild(el);
        words.push(el);
}

/* бегущая подсветка */
let i = 0;
setInterval(()=>{
        words.forEach(w=>w.classList.remove("active"));
        words[i].classList.add("active");
        i = (i + 1) % words.length;
},95);

/* звезды */
for(let s=0; s<220; s++){
        let star = document.createElement("div");
        star.className = "star";
        star.style.left = Math.random()*window.innerWidth + "px";
        star.style.top = Math.random()*window.innerHeight + "px";
        star.style.animationDelay = Math.random()*3 + "s";
        star.style.animationDuration = (1.5 + Math.random()*3) + "s";
        scene.appendChild(star);
}

/* падающие сердечки */
for(let h=0; h<24; h++){
        let fall = document.createElement("div");
        fall.className = "fall";
        fall.innerText = "❤";
        fall.style.left = Math.random()*window.innerWidth + "px";
        fall.style.animationDelay = Math.random()*8 + "s";
        fall.style.animationDuration = (6 + Math.random()*5) + "s";
        scene.appendChild(fall);
}
</script>

</body>
</html>
